name: NEXUS Daily Update
permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  nexus-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run NEXUS aggregation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node nexus-daily.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NEXUS Bot"
          git add nexus-daily-output/
          git commit -m "Actualización diaria NEXUS" || echo "Nada para commitear"
          git push
