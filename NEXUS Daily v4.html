<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS Daily v4</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f0f1a; color: #e0e0f0; min-height: 100vh; }
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header { background: #1a1a2e; padding: 16px 20px; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 22px; color: #7c83fd; letter-spacing: 2px; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.tabs { display: flex; background: #12122a; border-bottom: 1px solid #2a2a4a; }
.tab { flex: 1; padding: 12px 0; text-align: center; cursor: pointer; font-size: 14px; color: #888; background: none; border: none; border-bottom: 2px solid transparent; }
.tab.active { color: #7c83fd; font-weight: 700; border-bottom: 2px solid #7c83fd; }
.content { flex: 1; padding: 20px; overflow-y: auto; }
.card { background: #1a1a2e; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.btn { background: #7c83fd; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { background: #2a2a4a; color: #aaa; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
.btn-tts { background: #2a2a5a; color: #9ca3ff; border: 1px solid #3a3a6a; border-radius: 6px; padding: 10px 18px; cursor: pointer; font-size: 14px; }
.btn-tts.speaking { background: #3a1a1a; color: #ff6b6b; border-color: #5a2a2a; }
.input { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px 14px; color: #e0e0f0; font-size: 14px; width: 100%; }
.row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.row .input { flex: 1; }
.briefing-text { line-height: 1.7; font-size: 14px; white-space: pre-wrap; color: #d0d0f0; }
.tarea-row { display: flex; align-items: center; gap: 10px; }
.tarea-row span { flex: 1; }
.tarea-row input[type=checkbox] { width: 18px; height: 18px; }
.done { text-decoration: line-through; color: #555; }
.nota-row { display: flex; align-items: flex-start; gap: 10px; }
.nota-fecha { font-size: 11px; color: #555; margin-top: 4px; }
.muted { color: #555; font-size: 14px; }
.accent { color: #7c83fd; font-weight: bold; }
.source-item { font-size: 12px; color: #666; margin-bottom: 4px; }
.webmcp-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 8px; border-radius: 12px; margin-top: 6px; }
.webmcp-on { background: #1a3a2a; color: #4caf82; border: 1px solid #2a5a3a; }
.webmcp-off { background: #2a1a1a; color: #888; border: 1px solid #3a2a2a; }
.btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">



async function sGet(k, def) {
  try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : def; } catch { return def; }
}
async function sSet(k, v) {
  try { await window.storage.set(k, JSON.stringify(v)); } catch {}
}

function greeting() {
  const h = new Date().getHours();
  return h < 12 ? "Buenos días, Gabriel ☀️" : h < 18 ? "Buenas tardes, Gabriel 🌤️" : "Buenas noches, Gabriel 🌙";
}
function dateStr() {
  return new Date().toLocaleDateString("es-AR", {weekday:"long",year:"numeric",month:"long",day:"numeric"});
}

function App() {
  const [tab, setTab] = React.useState("Inicio");
  const [briefing, setBriefing] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [news, setNews] = React.useState([]);
  const [tareas, setTareas] = React.useState([]);
  const [nueva, setNueva] = React.useState("");
  const [memoria, setMemoria] = React.useState([]);
  const [nota, setNota] = React.useState("");
  const [speaking, setSpeaking] = React.useState(false);

  React.useEffect(() => {
    (async () => {
      setTareas(await sGet("nexus:tareas", []));
      setMemoria(await sGet("nexus:memoria", []));
      setBriefing(await sGet("nexus:briefing", ""));
    })();
  }, []);

  const saveTareas = async arr => { setTareas(arr); await sSet("nexus:tareas", arr); };
  const saveMemoria = async arr => { setMemoria(arr); await sSet("nexus:memoria", arr); };

  const generarBriefing = async () => {
    setLoading(true); setBriefing(""); setTab("Briefing");
    const hoy = new Date().toLocaleDateString("es-AR", {weekday:"long", year:"numeric", month:"long", day:"numeric"});
    const prompt = `Sos NEXUS, asistente de noticias tecnológicas de Gabriel (Buenos Aires). Hoy es ${hoy}. Buscá en la web las noticias más relevantes de tecnología e IA de las últimas 24-48 horas, y generá un briefing diario en español rioplatense, claro y directo. Incluí temas como IA, modelos de lenguaje, hardware, software, startups tech. Tono informativo y amigable. Máximo 400 palabras. Usá web search para obtener noticias reales y actuales.`;

    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }]
        })
      });
      const d = await r.json();
      const texto = d.content?.filter(b => b.type === "text").map(b => b.text).join("\n") || "No se pudo generar el briefing.";
      setBriefing(texto);
      await sSet("nexus:briefing", texto);
    } catch(e) {
      setBriefing("Error al generar el briefing: " + e.message);
    }
    setLoading(false);
  };

  const toggleTTS = () => {
    if (!briefing) return;
    if (speaking) { window.speechSynthesis.cancel(); setSpeaking(false); return; }
    const u = new SpeechSynthesisUtterance(briefing);
    u.lang = "es-AR"; u.rate = 0.95;
    u.onend = () => setSpeaking(false);
    u.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(u);
    setSpeaking(true);
  };

  const addTarea = () => {
    if (!nueva.trim()) return;
    saveTareas([...tareas, {id: Date.now(), texto: nueva.trim(), hecha: false}]);
    setNueva("");
  };
  const addNota = () => {
    if (!nota.trim()) return;
    saveMemoria([...memoria, {id: Date.now(), texto: nota.trim(), fecha: new Date().toLocaleDateString("es-AR")}]);
    setNota("");
  };

  return (
    <div className="app">
      <div className="header">
        <h1>⬡ NEXUS Daily</h1>
        <p>{greeting()}</p>
        <span className="webmcp-badge webmcp-off">○ WebMCP no disponible en Artifact</span>
      </div>
      <div className="tabs">
        {["Inicio","Briefing","Tareas","Memoria"].map(t => (
          <button key={t} className={`tab${tab===t?" active":""}`} onClick={() => setTab(t)}>{t}</button>
        ))}
      </div>
      <div className="content">

        {tab==="Inicio" && (
          <>
            <div className="card">
              <p style={{fontSize:13,color:"#888",marginBottom:8}}>📅 {dateStr()}</p>
              <p style={{fontSize:14,color:"#aaa",marginBottom:16}}>
                Tareas pendientes: <span className="accent">{tareas.filter(t=>!t.hecha).length}</span>
              </p>
              <button className="btn" onClick={generarBriefing}>🗞️ Generar Briefing del Día</button>
            </div>
            <div className="card">
              <p style={{fontSize:12,color:"#444"}}>NEXUS Daily v4 · Claude Sonnet · NewsAPI</p>
              <p style={{fontSize:11,color:"#333",marginTop:4}}>Xataka · TechCrunch · The Verge · Engadget · MuyComputer · Infobae</p>
            </div>
          </>
        )}

        {tab==="Briefing" && (
          <>
            <div className="btns">
              <button className="btn" onClick={generarBriefing} disabled={loading}>
                {loading ? "⏳ Generando..." : "🔄 Actualizar"}
              </button>
              {briefing && (
                <button className={`btn-tts${speaking?" speaking":""}`} onClick={toggleTTS}>
                  {speaking ? "⏹ Detener" : "🔊 Escuchar"}
                </button>
              )}
            </div>
            <div className="card">
              {loading
                ? <p style={{color:"#7c83fd"}}>Buscando noticias y generando resumen...</p>
                : briefing
                ? <p className="briefing-text">{briefing}</p>
                : <p className="muted">Presioná "Actualizar" para generar el briefing.</p>}
            </div>

          </>
        )}

        {tab==="Tareas" && (
          <>
            <div className="row">
              <input className="input" placeholder="Nueva tarea..." value={nueva}
                onChange={e=>setNueva(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTarea()} />
              <button className="btn" onClick={addTarea}>+</button>
            </div>
            {tareas.length===0 && <p className="muted">Sin tareas.</p>}
            {tareas.map(t => (
              <div key={t.id} className="card tarea-row">
                <input type="checkbox" checked={t.hecha}
                  onChange={() => saveTareas(tareas.map(x => x.id===t.id ? {...x,hecha:!x.hecha} : x))} />
                <span className={t.hecha?"done":""}>{t.texto}</span>
                <button className="btn-sm" onClick={() => saveTareas(tareas.filter(x=>x.id!==t.id))}>✕</button>
              </div>
            ))}
          </>
        )}

        {tab==="Memoria" && (
          <>
            <div className="row">
              <input className="input" placeholder="Agregar nota..." value={nota}
                onChange={e=>setNota(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNota()} />
              <button className="btn" onClick={addNota}>+</button>
            </div>
            {memoria.length===0 && <p className="muted">Sin notas en memoria.</p>}
            {memoria.map(m => (
              <div key={m.id} className="card nota-row">
                <div style={{flex:1}}>
                  <p style={{fontSize:14}}>{m.texto}</p>
                  <p className="nota-fecha">{m.fecha}</p>
                </div>
                <button className="btn-sm" onClick={() => saveMemoria(memoria.filter(x=>x.id!==m.id))}>✕</button>
              </div>
            ))}
          </>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
